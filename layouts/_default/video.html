{{ define "main" }}
<div class="content main__content clearfix">
    <header class="main__header">
        <h1 class="main__title">{{ .Title }}</h1>
    </header>

    {{ range .Params.daftar_video }}
    <div style="margin-bottom: 40px;">
        <h3>{{ .judul_video }}</h3>
        <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
            <iframe src="https://www.youtube.com/embed/{{ .youtube_id }}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border:0;" allowfullscreen title="{{ .judul_video }}"></iframe>
        </div>
    </div>
    {{ end }}
    
</div>
{{ end }}
