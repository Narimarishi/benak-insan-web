{{- if .Params.thumbnail }}
<figure class="post__thumbnail">
    <a class="post__thumbnail-link" href="{{ .RelPermalink }}">
        {{- $namaGambar := strings.TrimPrefix "/" .Params.thumbnail -}}
        <img class="post__thumbnail-image" src="{{ .RelPermalink }}{{ $namaGambar }}" alt="{{ .Title }}">
    </a>
</figure>
{{- end }}
