{{ $pag := .Paginator }}
{{ if gt $pag.TotalPages 1 }}
<div class="pagination custom-pagination">
    
    {{ if $pag.HasPrev }}
    <a class="pagination__item pagination__item--prev" href="{{ $pag.Prev.URL }}" aria-label="Previous">«</a>
    {{ end }}

    {{ range $pag.Pagers }}
        {{ if eq . $pag }}
        <span class="pagination__item pagination__item--current">{{ .PageNumber }}</span>
        {{ else }}
        <a class="pagination__item" href="{{ .URL }}">{{ .PageNumber }}</a>
        {{ end }}
    {{ end }}

    {{ if $pag.HasNext }}
    <a class="pagination__item pagination__item--next" href="{{ $pag.Next.URL }}" aria-label="Next">»</a>
    {{ end }}
    
</div>
{{ end }}
