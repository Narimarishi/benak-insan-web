# 1. Konfigurasi Server
backend:
  name: github
  repo: narimarishi/benak-insan-web
  branch: main
  base_url: https://benak-insan.vercel.app/api

# 2. Pengaturan Media & Gambar
media_folder: "static/gambar" # Tempat CMS menyimpan gambar yang di-upload klien
public_folder: "/gambar" # URL yang dicetak CMS ke dalam artikel

# 3. Merancang Formulir Input (Koleksi Artikel)
collections:
  - name: "artikel"
    label: "Artikel & Materi"
    folder: "content/posts"
    path: "{{slug}}/index" 
    # --- DUA BARIS INI ADALAH KUNCI UNTUK ENTRY ASSETS ---
    media_folder: "" 
    public_folder: ""
    # ------------------------------------------------------
    create: true
    extension: "md"
    format: "yaml-frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Judul Materi", name: "title", widget: "string"}
      - {label: "Tanggal Terbit", name: "date", widget: "datetime"}
      - {label: "Kategori", name: "categories", widget: "list", required: false}
      - {label: "Tag (Kata Kunci)", name: "tags", widget: "list", required: false}
      - {label: "Gambar Thumbnail", name: "thumbnail", widget: "image", required: false}
      - label: "Daftar Lampiran Dokumen"
        name: "lampiran"
        widget: "list"
        required: false
        collapsed: false
        summary: '{{fields.nama_dokumen}}'
        fields:
          - {label: "Nama/Judul Dokumen", name: "nama_dokumen", widget: "string"}
          - {label: "File Dokumen (PDF/PPT/Doc)", name: "file_dokumen", widget: "file"}
      - {label: "Isi Teks Artikel", name: "body", widget: "markdown"}

# 4. Merancang Formulir Input untuk Halaman Tunggal (Profil)
  - name: "halaman"
    label: "Pengaturan Halaman"
    files:
      - label: "Edit Profil Saya"
        name: "profil"
        file: "content/profil.md" # Pastikan nama file markdown profilmu benar di sini
        fields:
          - {label: "Judul Halaman", name: "title", widget: "string"}
          - {label: "Tanggal", name: "date", widget: "datetime"}
          - {label: "Sembunyikan Sidebar", name: "sidebar", widget: "boolean", default: false}
          - {label: "Layout (Sistem)", name: "layout", widget: "hidden", default: "profil"}
          
          # --- Ini adalah dua kolom khusus yang kita buat tadi ---
          - {label: "Foto Profil", name: "foto_profil", widget: "image", required: false}
          - {label: "Teks Biografi (Sebelah Foto)", name: "biografi", widget: "markdown", required: false}
          # ------------------------------------------------------
          
          - {label: "Isi Konten Lanjutan (Bagian Bawah)", name: "body", widget: "markdown"}

      - label: "Edit Halaman Video"
        name: "video"
        file: "content/video.md"
        fields:
          - {label: "Judul Halaman", name: "title", widget: "string"}
          - {label: "Layout (JANGAN DIUBAH)", name: "layout", widget: "hidden", default: "video"}
          - {label: "Sidebar (JANGAN DIUBAH)", name: "sidebar", widget: "boolean", default: false}
          - label: "Daftar Video BSKDN"
            name: "daftar_video"
            widget: "list"
            fields:
              - {label: "Judul Video", name: "judul_video", widget: "string"}
              - {label: "ID YouTube (Contoh: 9ASVTwsAjZg)", name: "youtube_id", widget: "string"}