# 1. Konfigurasi Server
backend:
  name: github
  repo: narimarishi/benak-insan-web
  branch: main
  base_url: https://benak-insan-web.vercel.app/api

# 2. Pengaturan Media & Gambar
media_folder: "static/gambar" # Tempat CMS menyimpan gambar yang di-upload klien
public_folder: "/gambar" # URL yang dicetak CMS ke dalam artikel

# 3. Merancang Formulir Input (Koleksi Artikel)
collections:
  - name: "artikel"
    label: "Artikel & Materi"
    folder: "content/posts"
    path: "{{slug}}/index" 
    # --- DUA BARIS INI ADALAH KUNCI UNTUK ENTRY ASSETS ---
    media_folder: "" 
    public_folder: ""
    # ------------------------------------------------------
    create: true
    extension: "md"
    format: "yaml-frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Judul Materi", name: "title", widget: "string"}
      - {label: "Tanggal Terbit", name: "date", widget: "datetime"}
      - {label: "Kategori", name: "categories", widget: "list", required: false}
      - {label: "Tag (Kata Kunci)", name: "tags", widget: "list", required: false}
      - {label: "Gambar Thumbnail", name: "thumbnail", widget: "image", required: false}
      - label: "Daftar Lampiran Dokumen"
        name: "lampiran"
        widget: "list"
        required: false
        collapsed: false
        summary: '{{fields.nama_dokumen}}'
        fields:
          - {label: "Nama/Judul Dokumen", name: "nama_dokumen", widget: "string"}
          - {label: "File Dokumen (PDF/PPT/Doc)", name: "file_dokumen", widget: "file"}
      - {label: "Isi Teks Artikel", name: "body", widget: "markdown"}