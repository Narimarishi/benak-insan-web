<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  
  <style>
    /* Sveltia menggunakan tombol dengan ikon SVG untuk GitHub. Kita sembunyikan tombol tersebut. */
    button:has(svg) { 
        display: none !important; 
    }
    /* Memastikan formulir Token tetap terlihat sempurna */
    form, input[type="password"], input[type="text"] {
        display: flex !important;
    }
    /* Menyembunyikan teks pemisah seperti "or" / "atau" jika ada */
    .divider, hr {
        display: none !important;
    }
  </style>

</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
