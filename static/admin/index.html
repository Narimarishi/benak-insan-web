<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <style>
    /* Menyembunyikan garis pemisah "atau" / "or" jika ada */
    hr, .divider, [role="separator"] {
        display: none !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>

  <script>
    // Membuat pengawas yang akan selalu mengecek elemen baru di layar
    const observer = new MutationObserver(() => {
      // Cari semua elemen tombol di layar
      const buttons = document.querySelectorAll('button');
      
      buttons.forEach(btn => {
        // Jika menemukan tombol dengan teks persis seperti ini...
        if (btn.textContent.trim() === 'Sign In with GitHub') {
          // ...Hancurkan (Sembunyikan)!
          btn.style.setProperty('display', 'none', 'important');
        }
      });
    });

    // Nyalakan CCTV-nya untuk mengawasi seluruh tubuh website (body)
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
