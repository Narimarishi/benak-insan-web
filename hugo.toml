# =========================================================
# 1. PENGATURAN UTAMA & PERBAIKAN URL GITHUB PAGES
# =========================================================
# WAJIB: Alamat asli GitHub Pages Anda (harus ada garis miring di akhir)
baseURL = "https://Narimarishi.github.io/benak-insan-web/"
title = "Benak Insan"
languageCode = "id-id"
theme = "mainroad"

# SAKLAR AJAIB: Memaksa Hugo memperbaiki semua link gambar & CSS yang rusak
canonifyURLs = true
relativeURLs = true

# =========================================================
# 2. PROFIL PENULIS
# =========================================================
[params.author]
  name = "Mohammad Rizky Luthfiah Aziz"
  bio = "Aparatur Sipil Negara | Akademisi & Peneliti"
  # PERBAIKAN: Hapus garis miring (/) di paling depan
  image = "images/foto-profil-rizky.jpg"

[markup.goldmark.renderer]
  unsafe = true

# =========================================================
# 3. PENGATURAN TEMA & CSS KUSTOM
# =========================================================
[params]
  # PERBAIKAN: Mencegah halaman profil muncul di daftar artikel beranda
  mainSections = ["posts"] 
  
  readmore = true 
  post_meta = ["author", "date", "categories"]
  
  # PERBAIKAN: Hapus garis miring (/) di paling depan
  customCSS = ["css/custom.css"]

# =========================================================
# 4. LOGO & SIDEBAR
# =========================================================
[params.logo]
  # Ini sudah benar (tidak ada garis miring di depan)
  image = "gambar/logo.png" 
  title = "BENAK INSAN"
  subtitle = "Portal Materi Ajar & Catatan Bebas"

[params.sidebar]
  home = "right"          
  list = "right"
  single = "right"
  widgets = ["search", "recent", "categories", "taglist"]

# =========================================================
# 5. MENU NAVIGASI
# =========================================================
[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10

  [[menu.main]]
    identifier = "artikel"
    name = "Artikel"
    # PERBAIKAN: Menghapus garis miring di depan agar tidak nyasar
    url = "posts/" 
    weight = 20

  [[menu.main]]
    identifier = "profil"
    name = "Profil Saya"
    # PERBAIKAN: Menghapus garis miring di depan
    url = "profil/" 
    weight = 30