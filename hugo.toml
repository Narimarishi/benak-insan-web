# =========================================================
# 1. PENGATURAN UTAMA
# =========================================================
baseURL = "https://Narimarishi.github.io/benak-insan-web/"
title = "Benak Insan"
languageCode = "id-id"
theme = "mainroad"

# SAKLAR AJAIB: Cukup gunakan ini, HAPUS relativeURLs agar tidak nyasar
canonifyURLs = true

# =========================================================
# 2. PROFIL PENULIS
# =========================================================
[params.author]
  name = "Mohammad Rizky Luthfiah Aziz"
  bio = "Aparatur Sipil Negara | Akademisi & Peneliti"
  # KEMBALIKAN GARIS MIRING: Agar selalu mencari di root folder images
  image = "/images/foto-profil-rizky.jpg"

[markup.goldmark.renderer]
  unsafe = true

# =========================================================
# 3. PENGATURAN TEMA & CSS KUSTOM
# =========================================================
[params]
  mainSections = ["posts"] 
  readmore = true 
  post_meta = ["author", "date", "categories"]
  
  # KEMBALIKAN GARIS MIRING
  customCSS = ["/css/custom.css"]

# =========================================================
# 4. LOGO & SIDEBAR
# =========================================================
[params.logo]
  # KEMBALIKAN GARIS MIRING
  image = "/gambar/logo.png" 
  title = "BENAK INSAN"
  subtitle = "Portal Materi Ajar & Catatan Bebas"

[params.sidebar]
  home = "right"          
  list = "right"
  single = "right"
  widgets = ["search", "recent", "categories", "taglist"]

# =========================================================
# 5. MENU NAVIGASI (KEMBALIKAN GARIS MIRING ABSOLUT)
# =========================================================
[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10

  [[menu.main]]
    identifier = "artikel"
    name = "Artikel"
    url = "/posts/" 
    weight = 20

  [[menu.main]]
    identifier = "profil"
    name = "Profil Saya"
    url = "/profil/" 
    weight = 30