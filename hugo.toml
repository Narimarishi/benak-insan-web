# =========================================================
# 1. PENGATURAN UTAMA
# =========================================================
baseURL = "https://benak-insan.vercel.app/"
title = "Benak Insan - Portal Pemikiran & Analisis Kebijakan Publik"
languageCode = "id-id"
theme = "mainroad"

# SAKLAR AJAIB: Cukup gunakan ini, HAPUS relativeURLs agar tidak nyasar
canonifyURLs = true

# =========================================================
# 2. PROFIL PENULIS
# =========================================================
[params.author]
  name = "Mohammad Rizky Luthfiah Aziz"
  bio = "Aparatur Sipil Negara | Akademisi & Peneliti"
  # KEMBALIKAN GARIS MIRING: Agar selalu mencari di root folder images
  image = "/images/foto-profil-rizky.jpg"

[markup.goldmark.renderer]
  unsafe = true

# =========================================================
# 3. PENGATURAN TEMA & CSS KUSTOM
# =========================================================
[params]
  description = "Portal digital Mohammad Rizky Luthfiah Aziz yang berbagi materi perkuliahan, analisis kebijakan publik, dan catatan tata kelola pemerintahan."
  mainSections = ["posts"] 
  readmore = true 
  post_meta = ["author", "date", "categories"]
  
  # MENGAKTIFKAN FAVICON (IKON TAB BROWSER)
  favicon = "/favicon.ico"
  
  # KEMBALIKAN GARIS MIRING
  customCSS = ["/css/custom.css"]

  # MENAMBAHKAN TOMBOL BACK TO TOP
  customJS = ["js/custom.js"]

# =========================================================
# 4. LOGO & SIDEBAR
# =========================================================
[params.logo]
  # KEMBALIKAN GARIS MIRING
  image = "/gambar/Logo-Benak-Insan.png" 
  title = "Benak Insan"
  subtitle = "Catatan Reflektif dari Ruang Pikir dan Batin"

[params.sidebar]
  home = "right"          
  list = "right"
  single = "right"
  widgets = ["recent", "categories", "taglist"]

# =========================================================
# 5. MENU NAVIGASI (KEMBALIKAN GARIS MIRING ABSOLUT)
# =========================================================
[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10

  [[menu.main]]
    identifier = "artikel"
    name = "Artikel"
    url = "/posts/" 
    weight = 20

  [[menu.main]]
    identifier = "profil"
    name = "Profil Saya"
    url = "/profil/" 
    weight = 30

# =========================================================
# 6. PENGATURAN DATABASE PENCARIAN (JSON)
# =========================================================
[outputs]
  home = ["HTML", "RSS", "JSON"]

# =========================================================
# 7. PENGATURAN ALAMAT
# =========================================================
[permalinks]
  posts = "/:slug/"